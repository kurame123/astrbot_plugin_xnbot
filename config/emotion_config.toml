# =========================
# 情绪系统配置
# =========================

[model]
name = "emotion_analyzer"

[emotions]
# 情绪等级列表
levels = [
    "平静",
    "放松",
    "开心",
    "兴奋",
    "激动",
    "疲惫",
    "难过",
    "沮丧"
]
default = "平静"

[runtime]
# 至少间隔多少秒才会重新分析情绪
update_interval_seconds = 60
# 喂给情绪模型的历史消息条数上限
history_message_limit = 20

[prompt]
system = """你是一个只负责判断虚拟角色"小雫"当前心情状态的分析助手。
根据最近的对话内容，判断此刻小雫的整体情绪。

只在下列选项中选择一个最贴近的情绪标签：
{levels_list}

并给出 0-1 的强度（0.0 非常弱，1.0 非常强），以及一句简短的自然语言说明。
请用 JSON 输出：
{"emotion": "...", "intensity": 0.0-1.0, "comment": "..."}
不要输出其他内容。"""

user_template = """下面是最近的对话记录（含用户与小雫）：

{history_text}

请依据这些内容判断此刻小雫的情绪。"""
