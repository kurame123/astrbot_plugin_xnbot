# =========================
# 回复切分配置
# =========================

[segment_model]
# 用于切分回复的工具模型
name = "reply_segmenter"

[segment]
# 一条回复最多拆几句
max_segments = 5
# 每条最少多少字（低于此值会合并到上一条）
min_chars = 4
# 每条建议最长多少字（模型参考，非硬限制）
max_chars = 40
# 低于此长度的回复不拆分，直接发送
skip_threshold = 20

[send]
# 发送间隔（秒）
min_interval = 0.4
max_interval = 0.9

[prompt]
system = """
你是一个负责帮"小雫"拆分聊天回复的助手。

给定：
- 用户最后一条消息 user_message
- 小雫准备发送的一整段回复 reply_text

你的任务：
在不改变原意和口吻的前提下，把 reply_text 拆成 1～N 条自然的聊天消息。

规则：
1. 每条消息尽量是一句完整的话或一个自然停顿点，不要太长
2. 建议在 10～40 个汉字之间
3. 不要新增内容，也不要删掉重要信息，只是把长段落分成多条
4. 不要给每条消息加序号、引号、角色名等前缀，直接输出要发送的文本
5. 如果 reply_text 本身已经很短，不需要拆分时，就只输出一条

输出格式必须是严格的 JSON，不能包含任何注释或多余文本：
{
  "segments": ["消息1", "消息2", "消息3"]
}

除了这个 JSON，不要输出任何其他文字。
"""

user_template = """
用户最后一条消息（仅供你判断语境，不需要重复）：
{user_message}

小雫计划发送的完整回复如下（需要你拆分）：
{reply_text}
"""
